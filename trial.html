<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4a36c9">
  <title>试阅 · 广西教师用书平台</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .trial-stage-tabs {
      display: flex;
      gap: 6px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .trial-stage-tab {
      padding: 6px 14px;
      font-size: 13px;
      color: var(--color-text-secondary);
      background: var(--color-surface-secondary);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .trial-stage-tab:hover {
      background: var(--color-primary-subtle);
      color: var(--color-primary);
    }
    .trial-stage-tab.active {
      background: var(--gradient-trial-cta);
      color: #fff;
      border-color: transparent;
    }
  </style>
</head>
<body>
  <div class="trial-header">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      返回目录
    </button>
    <div class="trial-stage-tabs" id="stageTabs" style="display:none;"></div>
    <div class="trial-info" id="trialInfo">加载中...</div>
  </div>
  <div class="trial-body" id="trialBody">
    <div class="loading-pulse">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    function goBack() {
      window.location.href = 'index.html';
    }

    function loadIframe(url) {
      const body = document.getElementById('trialBody');
      body.innerHTML = `<iframe src="${encodeURI(url)}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" allowfullscreen></iframe>`;
    }

    function renderStageTabs(pub, currentUrl) {
      const tabsEl = document.getElementById('stageTabs');
      if (!pub.secondaryTrialUrl) {
        tabsEl.style.display = 'none';
        return;
      }
      tabsEl.style.display = 'flex';
      const secondaryLabel = pub.secondaryTrialLabel || '其他版本';
      tabsEl.innerHTML = `
        <div class="trial-stage-tab ${currentUrl === pub.trialUrl ? 'active' : ''}" data-url="${escapeAttr(pub.trialUrl)}">小学</div>
        <div class="trial-stage-tab ${currentUrl === pub.secondaryTrialUrl ? 'active' : ''}" data-url="${escapeAttr(pub.secondaryTrialUrl)}">${escapeHtml(secondaryLabel)}</div>
      `;
      tabsEl.addEventListener('click', (e) => {
        const tab = e.target.closest('.trial-stage-tab');
        if (!tab) return;
        const url = tab.dataset.url;
        tabsEl.querySelectorAll('.trial-stage-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadIframe(url);
      });
    }

    function escapeAttr(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const directUrl = params.get('url');
      const title = params.get('title') || '教参试阅';
      const pubId = params.get('id');
      const body = document.getElementById('trialBody');
      const info = document.getElementById('trialInfo');

      // Case 1: Direct book URL (from individual book trial)
      if (directUrl) {
        info.textContent = title;
        setTimeout(() => loadIframe(directUrl), 300);
        return;
      }

      // Case 2: Publisher trial (from publisher card)
      if (pubId && typeof publishers !== 'undefined') {
        const pub = publishers.find(p => p.id === pubId);
        if (pub) {
          info.textContent = pub.name + ' · ' + pub.series;
          renderStageTabs(pub, pub.trialUrl);
          setTimeout(() => loadIframe(pub.trialUrl), 300);
          return;
        }
      }

      // Error fallback
      body.innerHTML = `
        <div class="redirect-msg">
          <div class="icon">⚠️</div>
          <p>未指定要试阅的内容</p>
          <div class="sub">请返回目录重新选择</div>
          <button class="redirect-btn" onclick="window.location.href='index.html'">返回目录</button>
        </div>
      `;
    });
  </script>
</body>
</html>
